<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
  <section class="container">
    <h1>Controle a data</h1>
    <p class="date">
      Segunda-Feira, 20 de Abril de 2025 às 10:45:03
    </p>
    <div class="container-buttons">
      <button id="down-day" class="button">- 1 dia</button>
      <button id="up-day" class="button">+ 1 dia</button>

      <button id="down-month" class="button">- 1 mês</button>
      <button id="up-month" class="button">+ 1 mês</button>

      <button id="down-year" class="button">- 1 ano</button>
      <button id="up-year" class="button">+ 1 ano</button>

      <button id="down-hour" class="button">- 1 hora</button>
      <button id="up-hour" class="button">+ 1 hora</button>
    </div>
  </section>
  <script src="./assets/js/main.js"></script>
</body>

</html>
